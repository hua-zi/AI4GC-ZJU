name: Content & build check

# Runs lint + typecheck + tests + build on every PR (and on master) so
# contributions are validated automatically before review/merge. Add this
# check as a required status in the branch ruleset to block red PRs.

on:
  pull_request:
  push:
    branches: [master]

jobs:
  check:
    name: Content & build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, test, build
        run: npm run check
        env:
          # Raises GitHub API rate limits for star-count fetches during build.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
